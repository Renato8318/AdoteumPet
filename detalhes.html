    // Lógica de Tema Escuro (Repetida aqui para detalhes.html ser independente)
    function toggleDarkMode() {
        const isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    function initTheme() {
        const savedTheme = localStorage.getItem('theme');
        
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else if (savedTheme === 'light') {
            document.documentElement.classList.remove('dark');
        }
    }

    // Função para buscar fotos extras da API
    async function loadExtraPhotos(breed) {
        try {
            const galleryContainer = document.getElementById('extra-photos');
            // Busca fotos da raça específica
            const response = await fetch(`https://dog.ceo/api/breed/${breed}/images/random/6`);
            const data = await response.json();
            
            // Se a raça não for encontrada, a API retorna erro, então fazemos um fallback para random
            const images = data.status === "success" ? data.message : [];
            
            images.forEach((imgUrl, i) => {
                const imgElement = document.createElement('img');
                imgElement.src = imgUrl;
                imgElement.className = "opacity-0 animate-fade-in w-20 h-20 sm:w-24 sm:h-24 rounded-xl object-cover cursor-pointer hover:ring-4 hover:ring-emerald-500 transition-all shadow-md flex-shrink-0";
                imgElement.style.animationDelay = `${(i + 1) * 0.1}s`;
                imgElement.onclick = () => {
                    document.getElementById('main-dog-img').src = imgUrl;
                };
                galleryContainer.appendChild(imgElement);
            });
            document.getElementById('api-status').textContent = "Mais fotos encontradas!";
        } catch (error) {
            console.error("Erro ao carregar fotos da API:", error);
        }
    }

                            <button class="w-full py-5 mt-8 bg-gradient-to-br from-emerald-400 to-teal-600 text-white font-black rounded-2xl transition-all duration-500 text-xl shadow-xl hover:shadow-emerald-500/40 hover:scale-[1.02] active:scale-95 flex items-center justify-center gap-3" onclick="finishAdoption('${selectedDog.name}')"><i class="fas fa-heart animate-pulse"></i> Quero Adotar!</button>
                            
                            <a href="${whatsappUrl}" target="_blank" class="w-full py-4 mt-3 bg-[#25D366] text-white font-black rounded-2xl transition-all duration-300 text-lg shadow-xl hover:shadow-green-500/20 hover:scale-[1.02] active:scale-95 flex items-center justify-center gap-3">
                                <i class="fab fa-whatsapp text-2xl"></i> Compartilhar no WhatsApp
                            </a>

                            <a href="index.html" class="w-full mt-6 flex items-center justify-center gap-2 text-gray-400 dark:text-slate-500 font-black text-[10px] uppercase tracking-widest hover:text-emerald-500 transition-colors">
                                <i class="fas fa-arrow-left text-sm"></i> Voltar para a lista
                            </a>
                        </div>
                    </div>
                </div>
            `;
            dogDetailsElement.innerHTML = dogDetails;
            loadExtraPhotos(selectedDog.breed); // Passa a raça do cão selecionado
        } else {
            dogDetailsElement.innerHTML = "<p class='p-4 bg-red-100 border border-red-400 text-red-700 rounded-lg'>Nenhum cachorro selecionado. Volte à <a href='index.html' class='font-bold underline hover:text-red-900'>lista principal</a>.</p>";
        }
    });
  </script>
</body>
</html>
